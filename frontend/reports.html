<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报告管理 - 报告生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .sidebar-item {
            transition: all 0.2s ease;
        }
        .sidebar-item:hover {
            background-color: rgba(99, 102, 241, 0.1);
        }
        .sidebar-item.active {
            background-color: rgba(99, 102, 241, 0.15);
            border-left: 3px solid #6366F1;
        }
        .btn-primary {
            background-color: #6366F1;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #4F46E5;
            opacity: 0.9;
        }
        .btn-success {
            background-color: #10B981;
            transition: all 0.2s ease;
        }
        .btn-success:hover {
            background-color: #059669;
            opacity: 0.9;
        }
        .btn-danger {
            background-color: #EF4444;
            transition: all 0.2s ease;
        }
        .btn-danger:hover {
            background-color: #DC2626;
            opacity: 0.9;
        }
        .table-row {
            transition: all 0.2s ease;
        }
        .table-row:hover {
            background-color: rgba(99, 102, 241, 0.03);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-completed {
            background-color: #D1FAE5;
            color: #059669;
        }
        .status-generating {
            background-color: #FED7AA;
            color: #C2410C;
        }
        .status-draft {
            background-color: #E5E7EB;
            color: #6B7280;
        }
        .status-failed {
            background-color: #FECACA;
            color: #DC2626;
        }
        .action-btn {
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            transform: translateY(-1px);
        }
        .pagination-btn {
            transition: all 0.2s ease;
        }
        .pagination-btn:hover:not(:disabled) {
            background-color: rgba(99, 102, 241, 0.1);
        }
        .pagination-btn.active {
            background-color: #6366F1;
            color: white;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Modal Animation */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .modal-exit {
            opacity: 1;
            transform: scale(1);
        }
        .modal-exit-active {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
    </style>
</head>
<body class="bg-[#F5F3FF] min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center px-6 fixed top-0 left-0 right-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-[#6366F1] rounded-lg flex items-center justify-center">
                <i class="fas fa-file-alt text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-semibold text-[#1E1B4B]">报告生成工具</h1>
        </div>
        <div class="ml-auto flex items-center space-x-4">
            <span class="text-sm text-gray-500">v1.1.0</span>
            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                <i class="fas fa-user text-gray-600 text-sm"></i>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 fixed left-0 top-16 bottom-0 z-40">
        <nav class="p-4 space-y-1">
            <a href="structure-config.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-600 hover:text-[#1E1B4B]">
                <i class="fas fa-sitemap w-5"></i>
                <span class="font-medium">报告结构配置</span>
            </a>
            <a href="reports.html" class="sidebar-item active flex items-center space-x-3 px-4 py-3 rounded-lg text-[#1E1B4B]">
                <i class="fas fa-list w-5"></i>
                <span class="font-medium">报告管理</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 pt-16 min-h-screen">
        <div class="p-8">
            <!-- Page Header -->
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-[#1E1B4B]">报告管理</h2>
                    <p class="text-gray-500 mt-1">管理所有生成的调研报告</p>
                </div>
                <button onclick="openCreateModal()" class="btn-primary text-white px-4 py-2 rounded-lg flex items-center space-x-2">
                    <i class="fas fa-plus"></i>
                    <span>生成新报告</span>
                </button>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
                <div class="flex flex-wrap items-center gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-sm text-gray-600">状态筛选：</span>
                        <select id="status-filter" onchange="filterReports()" 
                            class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1]">
                            <option value="">全部</option>
                            <option value="completed">已完成</option>
                            <option value="generating">生成中</option>
                            <option value="draft">草稿</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[200px]">
                        <div class="relative">
                            <input type="text" id="search-report" placeholder="搜索报告标题..." 
                                class="w-full pl-9 pr-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1]"
                                oninput="debounceSearch()">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        </div>
                    </div>
                    <button onclick="refreshReports()" class="text-gray-600 hover:text-[#6366F1] p-2 rounded-lg hover:bg-gray-100">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Reports Table -->
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">报告标题</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">产品名称</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">调研区域</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">状态</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">创建时间</th>
                                <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="reports-table-body" class="divide-y divide-gray-100">
                            <!-- Reports will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden py-16 text-center">
                    <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-file-alt text-gray-400 text-3xl"></i>
                    </div>
                    <p class="text-gray-500 mb-4">暂无报告数据</p>
                    <button onclick="openCreateModal()" class="btn-primary text-white px-4 py-2 rounded-lg inline-flex items-center space-x-2">
                        <i class="fas fa-plus"></i>
                        <span>生成第一份报告</span>
                    </button>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="flex items-center justify-between px-6 py-4 border-t border-gray-200 bg-gray-50/50">
                    <div class="text-sm text-gray-500">
                        共 <span id="total-count">0</span> 条记录
                    </div>
                    <div class="flex items-center space-x-2" id="pagination-controls">
                        <!-- Pagination buttons will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Report Modal -->
    <div id="create-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" onclick="closeCreateModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 transform transition-all scale-100">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-[#1E1B4B]">生成新报告</h3>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            
            <form id="create-report-form" onsubmit="submitCreateReport(event)" class="space-y-4">
                <!-- 1. 服务提供商 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">服务提供商 <span class="text-red-500">*</span></label>
                    <select id="provider-select" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1]">
                        <option value="">请选择服务提供商</option>
                    </select>
                </div>

                <!-- 2. 调研时间 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">调研时间 <span class="text-red-500">*</span></label>
                    <input type="text" id="time-range" required placeholder="如：2024年1月-3月" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1]">
                </div>

                <!-- 3. 调研对象 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">调研对象 <span class="text-red-500">*</span></label>
                    <select id="subject-select" required onchange="handleSubjectChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1]">
                        <option value="">请选择调研对象</option>
                    </select>
                </div>

                <!-- 4. 纬度模板 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">纬度模板 <span class="text-red-500">*</span></label>
                    <select id="template-select" required disabled class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1] bg-gray-50 disabled:cursor-not-allowed">
                        <option value="">请先选择调研对象</option>
                    </select>
                </div>

                <!-- 5. 问卷 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择问卷 <span class="text-red-500">*</span></label>
                    <select id="questionnaire-select" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#6366F1] focus:ring-1 focus:ring-[#6366F1]">
                        <option value="">请选择问卷</option>
                    </select>
                </div>

                <div class="pt-4 flex justify-end space-x-3">
                    <button type="button" onclick="closeCreateModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button type="submit" id="submit-btn" class="btn-primary text-white px-6 py-2 rounded-lg flex items-center space-x-2">
                        <span>生成报告</span>
                        <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-xl shadow-2xl w-full max-w-sm p-6">
            <div class="text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
                </div>
                <h3 class="text-lg font-semibold text-[#1E1B4B] mb-2">确认删除</h3>
                <p class="text-gray-500 text-sm mb-6">确定要删除此报告吗？此操作无法撤销。</p>
                <div class="flex justify-center space-x-3">
                    <button onclick="closeDeleteModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>
                    <button onclick="confirmDelete()" class="btn-danger text-white px-4 py-2 rounded-lg">删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        let currentPage = 1;
        let totalPages = 1;
        let deleteReportId = null;
        let searchTimeout = null;

        // Mock Data
        const PROVIDERS = ['爱诺', '北医', '其他'];
        const SUBJECTS = [
            { label: '医生', value: 'doctor' },
            { label: '患者', value: 'patient' }
        ];
        const QUESTIONNAIRES = [
            { id: 1, name: '标准满意度问卷 V1.0' },
            { id: 2, name: '随访调查问卷 V2.0' },
            { id: 3, name: '不良反应监测问卷' }
        ];

        // --- Create Modal Logic ---

        function openCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
            initCreateForm();
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
            document.getElementById('create-report-form').reset();
        }

        function initCreateForm() {
            // Populate Providers
            const providerSelect = document.getElementById('provider-select');
            providerSelect.innerHTML = '<option value="">请选择服务提供商</option>' + 
                PROVIDERS.map(p => `<option value="${p}">${p}</option>`).join('');

            // Populate Subjects
            const subjectSelect = document.getElementById('subject-select');
            subjectSelect.innerHTML = '<option value="">请选择调研对象</option>' + 
                SUBJECTS.map(s => `<option value="${s.value}">${s.label}</option>`).join('');
            
            // Populate Questionnaires (Mock)
            const questionnaireSelect = document.getElementById('questionnaire-select');
            questionnaireSelect.innerHTML = '<option value="">请选择问卷</option>' + 
                QUESTIONNAIRES.map(q => `<option value="${q.id}">${q.name}</option>`).join('');
            
            // Reset Template Select
            const templateSelect = document.getElementById('template-select');
            templateSelect.innerHTML = '<option value="">请先选择调研对象</option>';
            templateSelect.disabled = true;
            templateSelect.classList.add('bg-gray-50');
        }

        async function handleSubjectChange() {
            const subject = document.getElementById('subject-select').value;
            const templateSelect = document.getElementById('template-select');
            
            if (!subject) {
                templateSelect.innerHTML = '<option value="">请先选择调研对象</option>';
                templateSelect.disabled = true;
                templateSelect.classList.add('bg-gray-50');
                return;
            }

            // Fetch templates based on subject (report_type)
            templateSelect.innerHTML = '<option value="">加载中...</option>';
            try {
                const response = await fetch(`${API_BASE_URL}/templates?report_type=${subject}`);
                const data = await response.json();
                
                if (data.code === 200 && data.data.list.length > 0) {
                    templateSelect.innerHTML = '<option value="">请选择维度模板</option>' + 
                        data.data.list.map(t => `<option value="${t.id}">${t.template_name}</option>`).join('');
                    templateSelect.disabled = false;
                    templateSelect.classList.remove('bg-gray-50');
                } else {
                    templateSelect.innerHTML = '<option value="">该分类下暂无模板</option>';
                    templateSelect.disabled = true;
                }
            } catch (error) {
                console.error('Fetch templates failed:', error);
                templateSelect.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function submitCreateReport(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>提交中...</span>';

            const provider = document.getElementById('provider-select').value;
            const timeRange = document.getElementById('time-range').value;
            const subjectValue = document.getElementById('subject-select').value;
            const subjectLabel = SUBJECTS.find(s => s.value === subjectValue)?.label || '';
            const templateId = document.getElementById('template-select').value;
            const questionnaireId = document.getElementById('questionnaire-select').value;

            const payload = {
                report_title: `${provider} ${subjectLabel} 调研报告 ${timeRange}`,
                product_name: provider, // Using provider as product name or part of it
                survey_region: "全国", // Default
                survey_time_range: timeRange,
                sample_count: 100, // Default mock value
                template_id: parseInt(templateId),
                question_count: 0 // Will be updated by backend or parsing
            };

            try {
                const response = await fetch(`${API_BASE_URL}/reports`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.code === 200) {
                    closeCreateModal();
                    loadReports(); // Refresh list
                    // Optional: Show success message
                } else {
                    alert('创建失败: ' + (data.message || '未知错误'));
                }
            } catch (error) {
                console.error('Create report failed:', error);
                alert('创建失败，请检查网络');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // --- Existing Logic ---

        // Load reports
        async function loadReports(page = 1, status = '', search = '') {
            currentPage = page;
            
            try {
                let url = `${API_BASE_URL}/reports?page=${page}&page_size=10`;
                if (status) url += `&status=${status}`;
                if (search) url += `&search=${encodeURIComponent(search)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code === 200) {
                    renderReports(data.data.items || data.data.list); // Handle potential API difference
                    const total = data.data.total;
                    totalPages = Math.ceil(total / 10);
                    document.getElementById('total-count').textContent = total;
                    renderPagination();
                }
            } catch (error) {
                console.error('加载报告失败:', error);
                renderMockReports();
            }
        }

        function renderMockReports() {
            // Only used if API fails
            const mockReports = [
                { id: 1, title: '糖尿病药物市场调研报告', product_name: '二甲双胍缓释片', region: '华东地区', status: 'completed', created_at: '2024-01-15 10:30:00' },
                { id: 2, title: '心血管疾病用药调研', product_name: '阿托伐他汀钙片', region: '全国', status: 'generating', created_at: '2024-01-15 09:15:00' }
            ];
            renderReports(mockReports);
            document.getElementById('total-count').textContent = mockReports.length;
            renderPagination();
        }

        function renderReports(reports) {
            const tbody = document.getElementById('reports-table-body');
            const emptyState = document.getElementById('empty-state');
            
            if (!reports || reports.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            const statusConfig = {
                completed: { class: 'status-completed', text: '已完成', icon: 'fa-check-circle' },
                generating: { class: 'status-generating', text: '生成中', icon: 'fa-spinner fa-spin' },
                draft: { class: 'status-draft', text: '草稿', icon: 'fa-pencil-alt' },
                failed: { class: 'status-failed', text: '失败', icon: 'fa-times-circle' }
            };
            
            tbody.innerHTML = reports.map(report => {
                const status = statusConfig[report.status] || statusConfig.draft;
                const canDownload = report.status === 'completed';
                
                return `
                    <tr class="table-row">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#${report.id}</td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-medium text-[#1E1B4B]">${report.report_title || report.title}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${report.product_name || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${report.survey_region || report.region || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="status-badge ${status.class}">
                                <i class="fas ${status.icon} mr-1.5"></i>
                                ${status.text}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatDate(report.created_at)}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center space-x-2">
                                <button onclick="viewReport(${report.id})" class="action-btn p-2 text-[#6366F1] hover:bg-[#6366F1]/10 rounded-lg" title="查看">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="downloadReport(${report.id})" 
                                    class="action-btn p-2 ${canDownload ? 'text-green-600 hover:bg-green-50' : 'text-gray-300 cursor-not-allowed'} rounded-lg" 
                                    title="下载Word" ${!canDownload ? 'disabled' : ''}>
                                    <i class="fas fa-file-word"></i>
                                </button>
                                <button onclick="openDeleteModal(${report.id})" class="action-btn p-2 text-red-500 hover:bg-red-50 rounded-lg" title="删除">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination() {
            const container = document.getElementById('pagination-controls');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = `
                <button onclick="changePage(${currentPage - 1})" 
                    class="pagination-btn px-3 py-1.5 rounded-lg border border-gray-300 text-sm" 
                    ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `
                        <button onclick="changePage(${i})" 
                            class="pagination-btn px-3 py-1.5 rounded-lg border border-gray-300 text-sm ${i === currentPage ? 'active' : ''}">
                            ${i}
                        </button>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="px-2 text-gray-400">...</span>`;
                }
            }
            
            html += `
                <button onclick="changePage(${currentPage + 1})" 
                    class="pagination-btn px-3 py-1.5 rounded-lg border border-gray-300 text-sm" 
                    ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            container.innerHTML = html;
        }

        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-report').value;
            loadReports(page, status, search);
        }

        function filterReports() {
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-report').value;
            loadReports(1, status, search);
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                filterReports();
            }, 300);
        }

        function refreshReports() {
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-report').value;
            loadReports(currentPage, status, search);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function viewReport(id) {
            window.open(`view.html?id=${id}`, '_blank');
        }

        async function downloadReport(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/reports/${id}/download`);
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `report-${id}.docx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }
            } catch (error) {
                console.error('下载报告失败:', error);
                alert('下载失败，请重试');
            }
        }

        function openDeleteModal(id) {
            deleteReportId = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            deleteReportId = null;
            document.getElementById('delete-modal').classList.add('hidden');
        }

        async function confirmDelete() {
            if (!deleteReportId) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/reports/${deleteReportId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.code === 200) {
                    closeDeleteModal();
                    refreshReports();
                }
            } catch (error) {
                console.error('删除报告失败:', error);
                alert('删除失败，请重试');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadReports();
        });
    </script>
</body>
</html>
