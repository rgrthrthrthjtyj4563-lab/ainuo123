version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: report-generator-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: report_generator
      MYSQL_USER: report_user
      MYSQL_PASSWORD: report_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: report-generator-api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=report_generator
      - DB_USER=report_user
      - DB_PASSWORD=report_pass
      - COZE_API_KEY=${COZE_API_KEY}
      - COZE_BASE_URL=${COZE_BASE_URL:-https://api.coze.cn}
      - DEBUG=false
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  uploads:
  outputs:
